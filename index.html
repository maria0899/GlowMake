<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Make</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #fafafa; }header { text-align: center; padding: 20px; background: white; }
header img { width: 150px; }

.carrinho {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #ff4d8d;
  color: white;
  padding: 10px;
  border-radius: 20px;
  cursor: pointer;
}

.box-carrinho {
  position: fixed;
  right: 10px;
  top: 60px;
  background: white;
  width: 250px;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  display: none;
}

.produto { background: white; margin: 10px; padding: 10px; border-radius: 10px; text-align: center; }
.btn { background: #25d366; color: white; padding: 8px; border-radius: 20px; display: inline-block; margin-top: 5px; cursor: pointer; }

  </style>
</head>
<body><div class="carrinho" onclick="toggleCarrinho()">🛒 Carrinho (<span id="qtd">0</span>)</div><div class="box-carrinho" id="box">
  <h3>Seu carrinho</h3>
  <ul id="lista"></ul>
  <button onclick="finalizar()">Finalizar no WhatsApp</button>
</div><header>
  <img src="logo.jpg">
</header><div class="produto">
  <h3>Base Matte</h3>
  <p>R$ 9,90</p>
  <div class="btn" onclick="addCarrinho('Base Matte - R$9,90')">Adicionar</div>
</div><div class="produto">
  <h3>Batom Matte</h3>
  <p>R$ 5,90</p>
  <div class="btn" onclick="addCarrinho('Batom Matte - R$5,90')">Adicionar</div>
</div><script>
let carrinho = [];

function addCarrinho(produto){
  carrinho.push(produto);
  atualizar();
}

function atualizar(){
  document.getElementById('qtd').innerText = carrinho.length;
  let lista = document.getElementById('lista');
  lista.innerHTML = '';
  carrinho.forEach(item => {
    let li = document.createElement('li');
    li.innerText = item;
    lista.appendChild(li);
  });
}

function toggleCarrinho(){
  let box = document.getElementById('box');
  box.style.display = box.style.display === 'block' ? 'none' : 'block';
}

function finalizar(){
  let texto = 'Pedido:%0A' + carrinho.join('%0A');
  window.open('https://wa.me/5511939102961?text=' + texto, '_blank');
}
</script></body>
</html>
